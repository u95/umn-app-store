<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>UMN App Store - Android Play Store</title>
    
    <!-- Catch bundle chunk loading or syntax errors and force reload bypassing cache -->
    <script>
      window.addEventListener('error', (e) => {
        const msg = e.message || '';
        const isChunkError = 
          msg.includes('SyntaxError') || 
          msg.includes('unexpected token') || 
          msg.includes('Loading chunk') || 
          msg.includes('Failed to fetch dynamically imported module') ||
          msg.includes('import.meta');
          
        if (isChunkError) {
          console.warn('Chunk loading or script parsing error detected! Performing clean cache-busted reload...');
          const url = new URL(window.location.href);
          url.searchParams.set('reload_buster', Date.now().toString());
          window.location.replace(url.toString());
        }
      }, true);
    </script>

    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#22c55e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/png" href="https://img.icons8.com/color/192/google-play.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
